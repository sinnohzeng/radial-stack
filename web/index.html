<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Radial Stack — 渐变标识图生成器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">
  <header class="header">
    <div class="header-brand">
      <h1>Radial Stack</h1>
      <span class="tag">v2.0</span>
    </div>
    <div class="header-actions">
      <button class="btn" onclick="downloadSVG()"><span>SVG</span><span style="font-size:14px">&darr;</span></button>
      <button class="btn" onclick="downloadPNG()"><span>PNG</span><span style="font-size:14px">&darr;</span></button>
    </div>
  </header>

  <aside class="panel" id="panel">
    <div class="section">
      <div class="section-label">文本内容</div>
      <input class="input-field" type="text" id="nameInput" value="综合管理部" placeholder="输入文本...">
    </div>

    <div class="section">
      <div class="section-label">画布预设</div>
      <select class="select-field" id="presetSelect" onchange="setPreset()">
        <optgroup label="通用">
          <option value="square" selected>正方形 (1:1)</option>
          <option value="banner-wide">宽幅横幅 (16:9)</option>
          <option value="banner-ultra">超宽横幅 (21:9)</option>
        </optgroup>
        <optgroup label="社交媒体">
          <option value="wechat-cover">公众号封面 (2.35:1)</option>
          <option value="wechat-article">文章配图</option>
          <option value="xiaohongshu">小红书 (3:4)</option>
          <option value="douyin">抖音封面 (9:16)</option>
        </optgroup>
        <optgroup label="电商">
          <option value="taobao-main">淘宝主图 (1:1)</option>
          <option value="taobao-banner">店铺横幅</option>
          <option value="jd-sku">京东主图 (1:1)</option>
        </optgroup>
        <optgroup label="设计">
          <option value="poster-a4">A4 海报</option>
          <option value="poster-horizontal">横版海报 (3:2)</option>
          <option value="ppt-slide">PPT 背景 (16:9)</option>
        </optgroup>
        <optgroup label="壁纸">
          <option value="desktop-wallpaper">桌面壁纸 (16:10)</option>
          <option value="mobile-wallpaper">手机壁纸</option>
        </optgroup>
      </select>
      <div style="margin-top:10px">
        <div class="section-label" style="margin-bottom:8px">导出分辨率</div>
        <div class="resolution-pills" id="resPills">
          <span class="res-pill active" data-res="standard" onclick="setResolution(this)">1K</span>
          <span class="res-pill" data-res="hd" onclick="setResolution(this)">HD</span>
          <span class="res-pill" data-res="2k" onclick="setResolution(this)">2K</span>
          <span class="res-pill" data-res="4k" onclick="setResolution(this)">4K</span>
          <span class="res-pill" data-res="8k" onclick="setResolution(this)">8K</span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">配色方案</div>
      <div class="palette-grid" id="paletteGrid"></div>
    </div>

    <div class="section">
      <div class="section-label">文字样式</div>
      <div class="style-grid">
        <div class="style-option active" data-style="pill" onclick="setTextStyle(this)">
          <span class="style-icon">&#9635;</span><span class="style-label">胶囊</span>
        </div>
        <div class="style-option" data-style="overlay" onclick="setTextStyle(this)">
          <span class="style-icon">A</span><span class="style-label">叠加</span>
        </div>
        <div class="style-option" data-style="vertical" onclick="setTextStyle(this)">
          <span class="style-icon">&#xFE31;</span><span class="style-label">竖排</span>
        </div>
        <div class="style-option" data-style="artistic" onclick="setTextStyle(this)">
          <span class="style-icon">&#10022;</span><span class="style-label">艺术</span>
        </div>
        <div class="style-option" data-style="none" onclick="setTextStyle(this)">
          <span class="style-icon">&#9711;</span><span class="style-label">无文字</span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">渐变参数</div>
      <div class="slider-row"><span class="slider-label">层数</span><span class="slider-value" id="layersValue">8</span></div>
      <input type="range" id="layersSlider" min="3" max="20" value="8" oninput="updateSlider('layers')">
      <div class="slider-row"><span class="slider-label">饱和度</span><span class="slider-value" id="saturationValue">130%</span></div>
      <input type="range" id="saturationSlider" min="80" max="180" value="130" oninput="updateSlider('saturation')">
      <div class="slider-row"><span class="slider-label">模糊</span><span class="slider-value" id="blurValue">3</span></div>
      <input type="range" id="blurSlider" min="0" max="30" value="3" oninput="updateSlider('blur')">
      <div class="toggle-row"><span class="slider-label">噪声纹理</span><div class="toggle" id="noiseToggle" onclick="toggleNoise()"></div></div>
      <div class="slider-row" style="margin-top:4px"><span class="slider-label">混合模式</span></div>
      <select class="select-field" id="blendSelect" onchange="updatePreview()">
        <option value="">默认</option>
        <option value="soft-light">Soft Light</option>
        <option value="multiply">Multiply</option>
        <option value="screen">Screen</option>
        <option value="overlay">Overlay</option>
      </select>
    </div>

    <div class="section">
      <div class="section-label">随机种子</div>
      <div class="seed-row">
        <input class="input-field" type="text" id="seedInput" placeholder="自动（基于名称）">
        <button class="btn-icon" onclick="randomizeSeed()" title="随机种子">&#127922;</button>
        <button class="btn-icon" onclick="clearSeed()" title="清除种子">&#10005;</button>
      </div>
    </div>

    <div class="section" style="border-bottom:none">
      <div class="btn-group">
        <button class="btn-primary" onclick="updatePreview()">重新生成</button>
      </div>
    </div>
  </aside>

  <main class="preview">
    <div class="preview-frame" id="previewFrame"></div>
  </main>
</div>

<script type="module" src="./main.js"></script>

<footer class="footer">&copy; 2026 Zeng Zixuan &middot; <a href="../LICENSE">MIT License</a></footer>
</body>
</html>
