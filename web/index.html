<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="基于 SVG 多层径向渐变技术的标识图生成器" />
    <meta name="theme-color" content="#08080c" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f0f0f5" media="(prefers-color-scheme: light)" />
    <title>Radial Stack — 渐变标识图生成器</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><radialGradient id='a' cx='.3' cy='.3'><stop offset='0' stop-color='%23FF6B6B'/><stop offset='1' stop-color='%23c8a0ff'/></radialGradient><radialGradient id='b' cx='.7' cy='.6'><stop offset='0' stop-color='%2367e8f9'/><stop offset='1' stop-color='%23c8a0ff' stop-opacity='0'/></radialGradient></defs><rect width='32' height='32' rx='8' fill='%230a0a14'/><circle cx='10' cy='10' r='14' fill='url(%23a)' opacity='.8'/><circle cx='22' cy='20' r='12' fill='url(%23b)' opacity='.7'/></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header-brand">
          <svg class="brand-icon" width="24" height="24" viewBox="0 0 32 32" aria-hidden="true">
            <defs>
              <radialGradient id="fi-a" cx=".3" cy=".3"><stop offset="0" stop-color="#FF6B6B"/><stop offset="1" stop-color="#c8a0ff"/></radialGradient>
              <radialGradient id="fi-b" cx=".7" cy=".6"><stop offset="0" stop-color="#67e8f9"/><stop offset="1" stop-color="#c8a0ff" stop-opacity="0"/></radialGradient>
            </defs>
            <rect width="32" height="32" rx="8" fill="#0a0a14"/>
            <circle cx="10" cy="10" r="14" fill="url(#fi-a)" opacity=".8"/>
            <circle cx="22" cy="20" r="12" fill="url(#fi-b)" opacity=".7"/>
          </svg>
          <h1>Radial Stack</h1>
        </div>
        <div class="header-actions">
          <select class="lang-select" id="langSelect" aria-label="Language">
            <option value="zh-CN">简体中文</option>
            <option value="zh-HK">繁體中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
          </select>
          <button
            class="btn-theme"
            id="btnTheme"
            data-i18n-title="label.theme_toggle"
            data-i18n-aria-label="label.theme_toggle"
            title="切换主题"
            aria-label="切换主题"
          >
            &#9790;
          </button>
          <button class="btn" id="btnDownloadSVG" aria-label="Download SVG">
            <span>SVG</span><span style="font-size: 14px">&darr;</span>
          </button>
          <button class="btn" id="btnDownloadPNG" aria-label="Download PNG">
            <span>PNG</span><span style="font-size: 14px">&darr;</span>
          </button>
          <button class="btn" id="btnDownloadJPG" aria-label="Download JPG">
            <span>JPG</span><span style="font-size: 14px">&darr;</span>
          </button>
        </div>
      </header>

      <aside class="panel" id="panel">
        <div class="tab-bar" id="tabBar" role="tablist">
          <button
            class="tab active"
            data-tab="basic"
            data-i18n="tab.basic"
            role="tab"
            aria-selected="true"
            aria-controls="tab-basic"
          >
            基础
          </button>
          <button
            class="tab"
            data-tab="text"
            data-i18n="tab.text"
            role="tab"
            aria-selected="false"
            aria-controls="tab-text"
          >
            文字
          </button>
          <button
            class="tab"
            data-tab="effects"
            data-i18n="tab.effects"
            role="tab"
            aria-selected="false"
            aria-controls="tab-effects"
          >
            效果
          </button>
        </div>

        <!-- Tab 1: Basic -->
        <div class="tab-content active" id="tab-basic" role="tabpanel">
          <!-- Section: Text content -->
          <div class="section">
            <label class="section-label" for="nameInput" data-i18n="section.text_content"
              >文字内容</label
            >
            <textarea
              class="input-field"
              id="nameInput"
              rows="2"
              data-i18n-placeholder="placeholder.text_input"
              placeholder="输入文本（支持换行）"
            >
综合管理部</textarea
            >
          </div>

          <!-- Section: Random seed -->
          <div class="section">
            <label class="section-label" for="seedInput" data-i18n="section.random_seed"
              >随机种子</label
            >
            <div class="seed-row">
              <input
                class="input-field"
                type="text"
                id="seedInput"
                data-i18n-placeholder="placeholder.seed"
                placeholder="自动（基于名称）"
              />
              <button
                class="btn-icon"
                id="btnRandomSeed"
                data-i18n-title="button.random_seed"
                data-i18n-aria-label="button.random_seed"
                title="随机种子"
                aria-label="随机种子"
              >
                &#127922;
              </button>
              <button
                class="btn-icon"
                id="btnClearSeed"
                data-i18n-title="button.clear_seed"
                data-i18n-aria-label="button.clear_seed"
                title="清除种子"
                aria-label="清除种子"
              >
                &#10005;
              </button>
            </div>
          </div>

          <!-- Section: Canvas preset + Resolution -->
          <div class="section">
            <label class="section-label" for="presetSelect" data-i18n="section.canvas_preset"
              >画布预设</label
            >
            <select class="select-field" id="presetSelect">
              <optgroup label="常用" data-i18n-label="preset.group.general">
                <option value="square" selected data-i18n="preset.square">方形 (1:1)</option>
                <option value="banner-wide" data-i18n="preset.banner_wide">横幅 宽 (16:9)</option>
                <option value="banner-ultra" data-i18n="preset.banner_ultra">
                  横幅 超宽 (21:9)
                </option>
              </optgroup>
              <optgroup label="社交媒体" data-i18n-label="preset.group.social">
                <option value="wechat-cover" data-i18n="preset.wechat_cover">
                  微信封面 (2.35:1)
                </option>
                <option value="wechat-article" data-i18n="preset.wechat_article">微信文章</option>
                <option value="xiaohongshu" data-i18n="preset.xiaohongshu">小红书 (3:4)</option>
                <option value="douyin" data-i18n="preset.douyin">抖音 (9:16)</option>
              </optgroup>
              <optgroup label="电商" data-i18n-label="preset.group.ecommerce">
                <option value="taobao-main" data-i18n="preset.taobao_main">淘宝主图 (1:1)</option>
                <option value="taobao-banner" data-i18n="preset.taobao_banner">淘宝横幅</option>
                <option value="jd-sku" data-i18n="preset.jd_sku">京东商品 (1:1)</option>
              </optgroup>
              <optgroup label="设计" data-i18n-label="preset.group.design">
                <option value="poster-a4" data-i18n="preset.poster_a4">A4 海报</option>
                <option value="poster-horizontal" data-i18n="preset.poster_horizontal">
                  横版海报 (3:2)
                </option>
                <option value="ppt-slide" data-i18n="preset.ppt_slide">PPT 幻灯片 (16:9)</option>
              </optgroup>
              <optgroup label="壁纸" data-i18n-label="preset.group.wallpaper">
                <option value="desktop-wallpaper" data-i18n="preset.desktop_wallpaper">
                  桌面壁纸 (16:10)
                </option>
                <option value="mobile-wallpaper" data-i18n="preset.mobile_wallpaper">
                  手机壁纸
                </option>
              </optgroup>
            </select>

            <div style="margin-top: 10px">
              <div
                class="section-label"
                style="margin-bottom: 8px"
                data-i18n="section.export_resolution"
              >
                导出分辨率
              </div>
              <div class="resolution-pills" id="resPills" role="radiogroup" aria-label="Export resolution">
                <span class="res-pill" data-res="standard" role="radio" aria-checked="false" tabindex="0"
                  ><span class="res-label" data-i18n="res.standard">标准 1K</span
                  ><span class="res-dims" id="resDims-standard"></span
                ></span>
                <span class="res-pill" data-res="hd" role="radio" aria-checked="false" tabindex="0"
                  ><span class="res-label" data-i18n="res.hd">HD</span
                  ><span class="res-dims" id="resDims-hd"></span
                ></span>
                <span class="res-pill" data-res="2k" role="radio" aria-checked="false" tabindex="0"
                  ><span class="res-label" data-i18n="res.2k">2K</span
                  ><span class="res-dims" id="resDims-2k"></span
                ></span>
                <span class="res-pill active" data-res="4k" role="radio" aria-checked="true" tabindex="0"
                  ><span class="res-label" data-i18n="res.4k">4K UHD</span
                  ><span class="res-dims" id="resDims-4k"></span
                ></span>
                <span class="res-pill" data-res="8k" role="radio" aria-checked="false" tabindex="0"
                  ><span class="res-label" data-i18n="res.8k">8K</span
                  ><span class="res-dims" id="resDims-8k"></span
                ></span>
              </div>
            </div>
          </div>

          <!-- Section: Color palette -->
          <div class="section">
            <div class="section-label" data-i18n="section.color_palette">配色方案</div>
            <div class="palette-grid" id="paletteGrid" role="radiogroup" aria-label="Color palette"></div>
          </div>
        </div>

        <!-- Tab 2: Text -->
        <div class="tab-content" id="tab-text" role="tabpanel">
          <!-- Section: Text style (4 options) -->
          <div class="section">
            <div class="section-label" data-i18n="section.text_style">文字样式</div>
            <div class="style-grid" role="radiogroup" aria-label="Text style">
              <div class="style-option active" data-style="pill" role="radio" aria-checked="true" tabindex="0">
                <span class="style-icon">&#9635;</span
                ><span class="style-label" data-i18n="style.pill">胶囊</span>
              </div>
              <div class="style-option" data-style="overlay" role="radio" aria-checked="false" tabindex="0">
                <span class="style-icon">A</span
                ><span class="style-label" data-i18n="style.overlay">叠加</span>
              </div>
              <div class="style-option" data-style="vertical" role="radio" aria-checked="false" tabindex="0">
                <span class="style-icon">&#xFE31;</span
                ><span class="style-label" data-i18n="style.vertical">竖排</span>
              </div>
              <div class="style-option" data-style="none" role="radio" aria-checked="false" tabindex="0">
                <span class="style-icon">&#9711;</span
                ><span class="style-label" data-i18n="style.none">无文字</span>
              </div>
            </div>
          </div>

          <!-- Section: Font -->
          <div class="section">
            <label class="section-label" for="fontSelect" data-i18n="section.font">字体</label>
            <select class="select-field" id="fontSelect">
              <option value="builtin-sc" selected data-i18n="font.builtin_sc">阿里巴巴普惠体 3.0（简体）</option>
              <option value="builtin-hk" data-i18n="font.builtin_hk">Alibaba Sans HK（繁体）</option>
              <option value="builtin-jp" data-i18n="font.builtin_jp">Alibaba Sans JP（日文）</option>
              <option value="builtin-kr" data-i18n="font.builtin_kr">Alibaba Sans KR（韩文）</option>
              <option value="system" data-i18n="font.system">系统字体</option>
              <option value="custom" data-i18n="font.custom">上传自定义字体...</option>
            </select>
            <input type="file" id="fontInput" accept=".ttf,.otf" style="display: none" />
            <div id="fontStatus" class="font-status" aria-live="polite"></div>
            <div class="toggle-row" style="margin-top: 10px">
              <span class="slider-label" data-i18n="label.outline">导出时轮廓化</span>
              <div
                class="toggle active"
                id="outlineToggle"
                role="switch"
                aria-checked="true"
                tabindex="0"
                data-i18n-title="label.outline"
                title="将文字转为矢量路径"
              ></div>
            </div>
          </div>

          <!-- Section: Typography -->
          <div class="section">
            <div class="section-label" data-i18n="section.typography">排版</div>
            <div class="slider-row">
              <label class="slider-label" for="fontSizeSlider" data-i18n="label.font_size"
                >字号</label
              ><span class="slider-value" id="fontSizeValue">自动</span>
            </div>
            <input type="range" id="fontSizeSlider" min="0" max="120" value="0" />

            <div class="slider-row">
              <label class="slider-label" for="fontWeightSelect" data-i18n="label.font_weight"
                >字重</label
              >
            </div>
            <select class="select-field" id="fontWeightSelect">
              <option value="400" data-i18n="weight.regular">Regular (400)</option>
              <option value="500" data-i18n="weight.medium">Medium (500)</option>
              <option value="600" selected data-i18n="weight.semibold">SemiBold (600)</option>
              <option value="700" data-i18n="weight.bold">Bold (700)</option>
            </select>

            <div class="slider-row">
              <label class="slider-label" for="letterSpacingSlider" data-i18n="label.letter_spacing"
                >字间距</label
              ><span class="slider-value" id="letterSpacingValue">2</span>
            </div>
            <input type="range" id="letterSpacingSlider" min="0" max="20" value="2" />

            <div class="slider-row">
              <label class="slider-label" for="lineHeightSlider" data-i18n="label.line_height"
                >行高</label
              ><span class="slider-value" id="lineHeightValue">1.4</span>
            </div>
            <input type="range" id="lineHeightSlider" min="10" max="25" value="14" step="1" />

            <div class="slider-row">
              <span class="slider-label" data-i18n="label.text_color">文字颜色</span>
              <label class="auto-toggle"
                ><input type="checkbox" id="textColorAuto" checked />
                <span data-i18n="label.auto">自动</span></label
              >
              <input
                type="color"
                id="textColorInput"
                value="#ffffff"
                class="color-input"
                disabled
                aria-label="Text color"
              />
            </div>
          </div>
        </div>

        <!-- Tab 3: Effects -->
        <div class="tab-content" id="tab-effects" role="tabpanel">
          <!-- Section: Gradient params -->
          <div class="section">
            <div class="section-label" data-i18n="section.gradient_params">渐变参数</div>
            <div class="slider-row">
              <label class="slider-label" for="layersSlider" data-i18n="label.layers">层数</label
              ><span class="slider-value" id="layersValue">12</span>
            </div>
            <input type="range" id="layersSlider" min="3" max="20" value="12" />
            <div class="slider-row">
              <label class="slider-label" for="saturationSlider" data-i18n="label.saturation"
                >饱和度</label
              ><span class="slider-value" id="saturationValue">130%</span>
            </div>
            <input type="range" id="saturationSlider" min="80" max="180" value="130" />
            <div class="slider-row">
              <label class="slider-label" for="blurSlider" data-i18n="label.blur">模糊</label
              ><span class="slider-value" id="blurValue">3</span>
            </div>
            <input type="range" id="blurSlider" min="0" max="30" value="3" />
          </div>

          <!-- Section: Noise texture (4-state pills) -->
          <div class="section">
            <div class="section-label" data-i18n="section.noise_texture">噪点纹理</div>
            <div class="noise-pills" id="noisePills" role="radiogroup" aria-label="Noise texture">
              <span class="noise-pill active" data-noise="off" data-i18n="noise.off" role="radio" aria-checked="true" tabindex="0">关闭</span>
              <span class="noise-pill" data-noise="high" data-i18n="noise.high" role="radio" aria-checked="false" tabindex="0">高</span>
              <span class="noise-pill" data-noise="intense" data-i18n="noise.intense" role="radio" aria-checked="false" tabindex="0">强烈</span>
              <span class="noise-pill" data-noise="extreme" data-i18n="noise.extreme" role="radio" aria-checked="false" tabindex="0">极致</span>
            </div>
          </div>

          <!-- Section: Blend mode -->
          <div class="section">
            <label class="section-label" for="blendSelect" data-i18n="section.blend_mode"
              >混合模式</label
            >
            <select class="select-field" id="blendSelect">
              <option value="" data-i18n="blend.default">默认</option>
              <option value="soft-light" data-i18n="blend.soft_light">柔光</option>
              <option value="multiply" data-i18n="blend.multiply">正片叠底</option>
              <option value="screen" data-i18n="blend.screen">滤色</option>
              <option value="overlay" data-i18n="blend.overlay">叠加</option>
            </select>
          </div>

        </div>
      </aside>

      <main class="preview">
        <div class="preview-frame" id="previewFrame" aria-label="Preview"></div>
      </main>

      <!-- FAB: mobile download buttons -->
      <div class="fab-container" id="fabContainer">
        <div class="fab-menu" id="fabMenu" role="menu">
          <button class="fab-item" id="fabDownloadSVG" role="menuitem" data-i18n-aria-label="button.download_svg">SVG</button>
          <button class="fab-item" id="fabDownloadPNG" role="menuitem" data-i18n-aria-label="button.download_png">PNG</button>
          <button class="fab-item" id="fabDownloadJPG" role="menuitem" data-i18n-aria-label="button.download_jpg">JPG</button>
        </div>
        <button class="fab-trigger" id="fabTrigger" aria-expanded="false" aria-haspopup="menu" data-i18n-aria-label="button.download">
          <span class="fab-icon">&darr;</span>
        </button>
      </div>
    </div>

    <script type="module" src="./main.js"></script>

    <footer class="footer">
      <span>&copy; 2026 Zeng Zixuan &middot; <a href="../LICENSE">MIT License</a></span>
      <span class="version" id="appVersion"></span>
    </footer>
  </body>
</html>
