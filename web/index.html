<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Radial Stack — 渐变标识图生成器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">
  <header class="header">
    <div class="header-brand">
      <h1>Radial Stack</h1>
      <span class="tag">v2.0</span>
    </div>
    <div class="header-actions">
      <select class="lang-select" id="langSelect">
        <option value="zh-CN">简体中文</option>
        <option value="zh-TW">繁體中文</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
      </select>
      <button class="btn-theme" id="btnTheme" title="切换主题">&#9790;</button>
      <button class="btn" id="btnDownloadSVG"><span>SVG</span><span style="font-size:14px">&darr;</span></button>
      <button class="btn" id="btnDownloadPNG"><span>PNG</span><span style="font-size:14px">&darr;</span></button>
    </div>
  </header>

  <aside class="panel" id="panel">
    <div class="tab-bar" id="tabBar">
      <button class="tab active" data-tab="basic" data-i18n="tab.basic">基础</button>
      <button class="tab" data-tab="text" data-i18n="tab.text">文字</button>
      <button class="tab" data-tab="effects" data-i18n="tab.effects">效果</button>
    </div>

    <!-- Tab 1: Basic -->
    <div class="tab-content active" id="tab-basic">
      <!-- Section: Text content -->
      <div class="section">
        <div class="section-label" data-i18n="section.text_content">文字内容</div>
        <textarea class="input-field" id="nameInput" rows="2" data-i18n-placeholder="placeholder.text_input" placeholder="输入文本（支持换行）">综合管理部</textarea>
      </div>

      <!-- Section: Random seed -->
      <div class="section">
        <div class="section-label" data-i18n="section.random_seed">随机种子</div>
        <div class="seed-row">
          <input class="input-field" type="text" id="seedInput" data-i18n-placeholder="placeholder.seed" placeholder="自动（基于名称）">
          <button class="btn-icon" id="btnRandomSeed" title="随机种子">&#127922;</button>
          <button class="btn-icon" id="btnClearSeed" title="清除种子">&#10005;</button>
        </div>
      </div>

      <!-- Section: Canvas preset + Resolution -->
      <div class="section">
        <div class="section-label" data-i18n="section.canvas_preset">画布预设</div>
        <select class="select-field" id="presetSelect">
          <optgroup label="常用" data-i18n="preset.group.general">
            <option value="square" selected data-i18n="preset.square">方形 (1:1)</option>
            <option value="banner-wide" data-i18n="preset.banner_wide">横幅 宽 (16:9)</option>
            <option value="banner-ultra" data-i18n="preset.banner_ultra">横幅 超宽 (21:9)</option>
          </optgroup>
          <optgroup label="社交媒体" data-i18n="preset.group.social">
            <option value="wechat-cover" data-i18n="preset.wechat_cover">微信封面 (2.35:1)</option>
            <option value="wechat-article" data-i18n="preset.wechat_article">微信文章</option>
            <option value="xiaohongshu" data-i18n="preset.xiaohongshu">小红书 (3:4)</option>
            <option value="douyin" data-i18n="preset.douyin">抖音 (9:16)</option>
          </optgroup>
          <optgroup label="电商" data-i18n="preset.group.ecommerce">
            <option value="taobao-main" data-i18n="preset.taobao_main">淘宝主图 (1:1)</option>
            <option value="taobao-banner" data-i18n="preset.taobao_banner">淘宝横幅</option>
            <option value="jd-sku" data-i18n="preset.jd_sku">京东商品 (1:1)</option>
          </optgroup>
          <optgroup label="设计" data-i18n="preset.group.design">
            <option value="poster-a4" data-i18n="preset.poster_a4">A4 海报</option>
            <option value="poster-horizontal" data-i18n="preset.poster_horizontal">横版海报 (3:2)</option>
            <option value="ppt-slide" data-i18n="preset.ppt_slide">PPT 幻灯片 (16:9)</option>
          </optgroup>
          <optgroup label="壁纸" data-i18n="preset.group.wallpaper">
            <option value="desktop-wallpaper" data-i18n="preset.desktop_wallpaper">桌面壁纸 (16:10)</option>
            <option value="mobile-wallpaper" data-i18n="preset.mobile_wallpaper">手机壁纸</option>
          </optgroup>
        </select>

        <div style="margin-top:10px">
          <div class="section-label" style="margin-bottom:8px" data-i18n="section.export_resolution">导出分辨率</div>
          <div class="resolution-pills" id="resPills">
            <span class="res-pill" data-res="standard"><span class="res-label" data-i18n="res.standard">标准 1K</span><span class="res-dims" id="resDims-standard"></span></span>
            <span class="res-pill" data-res="hd"><span class="res-label" data-i18n="res.hd">HD</span><span class="res-dims" id="resDims-hd"></span></span>
            <span class="res-pill" data-res="2k"><span class="res-label" data-i18n="res.2k">2K</span><span class="res-dims" id="resDims-2k"></span></span>
            <span class="res-pill active" data-res="4k"><span class="res-label" data-i18n="res.4k">4K UHD</span><span class="res-dims" id="resDims-4k"></span></span>
            <span class="res-pill" data-res="8k"><span class="res-label" data-i18n="res.8k">8K</span><span class="res-dims" id="resDims-8k"></span></span>
          </div>
        </div>
      </div>

      <!-- Section: Color palette -->
      <div class="section">
        <div class="section-label" data-i18n="section.color_palette">配色方案</div>
        <div class="palette-grid" id="paletteGrid"></div>
      </div>
    </div>

    <!-- Tab 2: Text -->
    <div class="tab-content" id="tab-text">
      <!-- Section: Text style (4 options) -->
      <div class="section">
        <div class="section-label" data-i18n="section.text_style">文字样式</div>
        <div class="style-grid">
          <div class="style-option active" data-style="pill">
            <span class="style-icon">&#9635;</span><span class="style-label" data-i18n="style.pill">胶囊</span>
          </div>
          <div class="style-option" data-style="overlay">
            <span class="style-icon">A</span><span class="style-label" data-i18n="style.overlay">叠加</span>
          </div>
          <div class="style-option" data-style="vertical">
            <span class="style-icon">&#xFE31;</span><span class="style-label" data-i18n="style.vertical">竖排</span>
          </div>
          <div class="style-option" data-style="none">
            <span class="style-icon">&#9711;</span><span class="style-label" data-i18n="style.none">无文字</span>
          </div>
        </div>
      </div>

      <!-- Section: Font -->
      <div class="section">
        <div class="section-label" data-i18n="section.font">字体</div>
        <select class="select-field" id="fontSelect">
          <option value="builtin" selected data-i18n="font.builtin">阿里巴巴普惠体 3.0</option>
          <option value="system" data-i18n="font.system">系统字体</option>
          <option value="custom" data-i18n="font.custom">上传自定义字体...</option>
        </select>
        <input type="file" id="fontInput" accept=".ttf,.otf" style="display:none">
        <div id="fontStatus" class="font-status"></div>
        <div class="toggle-row" style="margin-top:10px">
          <span class="slider-label" data-i18n="label.outline">导出时轮廓化</span>
          <div class="toggle" id="outlineToggle" data-i18n-title="label.outline" title="将文字转为矢量路径"></div>
        </div>
      </div>

      <!-- Section: Typography -->
      <div class="section">
        <div class="section-label" data-i18n="section.typography">排版</div>
        <div class="slider-row"><span class="slider-label" data-i18n="label.font_size">字号</span><span class="slider-value" id="fontSizeValue">自动</span></div>
        <input type="range" id="fontSizeSlider" min="0" max="120" value="0">

        <div class="slider-row"><span class="slider-label" data-i18n="label.font_weight">字重</span></div>
        <select class="select-field" id="fontWeightSelect">
          <option value="400" data-i18n="weight.regular">Regular (400)</option>
          <option value="500" data-i18n="weight.medium">Medium (500)</option>
          <option value="600" selected data-i18n="weight.semibold">SemiBold (600)</option>
          <option value="700" data-i18n="weight.bold">Bold (700)</option>
        </select>

        <div class="slider-row"><span class="slider-label" data-i18n="label.letter_spacing">字间距</span><span class="slider-value" id="letterSpacingValue">2</span></div>
        <input type="range" id="letterSpacingSlider" min="0" max="20" value="2">

        <div class="slider-row"><span class="slider-label" data-i18n="label.line_height">行高</span><span class="slider-value" id="lineHeightValue">1.4</span></div>
        <input type="range" id="lineHeightSlider" min="10" max="25" value="14" step="1">

        <div class="slider-row">
          <span class="slider-label" data-i18n="label.text_color">文字颜色</span>
          <label class="auto-toggle"><input type="checkbox" id="textColorAuto" checked> <span data-i18n="label.auto">自动</span></label>
          <input type="color" id="textColorInput" value="#ffffff" class="color-input" disabled>
        </div>
      </div>
    </div>

    <!-- Tab 3: Effects -->
    <div class="tab-content" id="tab-effects">
      <!-- Section: Gradient params -->
      <div class="section">
        <div class="section-label" data-i18n="section.gradient_params">渐变参数</div>
        <div class="slider-row"><span class="slider-label" data-i18n="label.layers">层数</span><span class="slider-value" id="layersValue">12</span></div>
        <input type="range" id="layersSlider" min="3" max="20" value="12">
        <div class="slider-row"><span class="slider-label" data-i18n="label.saturation">饱和度</span><span class="slider-value" id="saturationValue">130%</span></div>
        <input type="range" id="saturationSlider" min="80" max="180" value="130">
        <div class="slider-row"><span class="slider-label" data-i18n="label.blur">模糊</span><span class="slider-value" id="blurValue">3</span></div>
        <input type="range" id="blurSlider" min="0" max="30" value="3">
      </div>

      <!-- Section: Noise texture (4-state pills) -->
      <div class="section">
        <div class="section-label" data-i18n="section.noise_texture">噪点纹理</div>
        <div class="noise-pills" id="noisePills">
          <span class="noise-pill" data-noise="off" data-i18n="noise.off">关闭</span>
          <span class="noise-pill" data-noise="low" data-i18n="noise.low">低</span>
          <span class="noise-pill active" data-noise="medium" data-i18n="noise.medium">中</span>
          <span class="noise-pill" data-noise="high" data-i18n="noise.high">高</span>
        </div>
      </div>

      <!-- Section: Blend mode -->
      <div class="section">
        <div class="section-label" data-i18n="section.blend_mode">混合模式</div>
        <select class="select-field" id="blendSelect">
          <option value="" data-i18n="blend.default">默认</option>
          <option value="soft-light" data-i18n="blend.soft_light">柔光</option>
          <option value="multiply" data-i18n="blend.multiply">正片叠底</option>
          <option value="screen" data-i18n="blend.screen">滤色</option>
          <option value="overlay" data-i18n="blend.overlay">叠加</option>
        </select>
      </div>

      <!-- Regenerate button -->
      <div class="section" style="border-bottom:none">
        <div class="btn-group">
          <button class="btn-primary" id="btnRegenerate" data-i18n="label.regenerate">重新生成</button>
        </div>
      </div>
    </div>
  </aside>

  <main class="preview">
    <div class="preview-frame" id="previewFrame"></div>
  </main>
</div>

<script type="module" src="./main.js"></script>

<footer class="footer">
  <span>&copy; 2026 Zeng Zixuan &middot; <a href="../LICENSE">MIT License</a></span>
  <span class="version" id="appVersion"></span>
</footer>
</body>
</html>
